name: Build MagnusChess

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Linux binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Show runner info
        run: |
          echo "CPU cores: $(nproc)"
          g++ --version
          lscpu | grep -E 'Model name|CPU\(s\)|Thread|Core|Architecture' || true
          free -h

      - name: Build portable x86-64
        working-directory: ./src
        run: make portable64 -j"$(nproc)"

      - name: Smoke test
        working-directory: ./src
        run: |
          echo "uci" | timeout 5s ./build/MagnusChess-portable64 || true

      - name: Perft depth 6
        working-directory: ./src
        run: ./build/MagnusChess-portable64 perft 6 1

      - name: Package binary
        run: |
          mkdir -p dist
          cp src/build/MagnusChess-portable64 dist/MagnusChess
          tar -czf MagnusChess-linux.tar.gz -C dist MagnusChess

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagnusChess-linux
          path: MagnusChess-linux.tar.gz
